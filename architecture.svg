<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect x="10" y="10" width="880" height="380" fill="#fff" stroke="#ddd"/>
  <text x="30" y="40" font-family="Arial" font-size="16" fill="#111">FlowScore AI — Architecture</text>

  <!-- User -->
  <rect x="40" y="70" width="140" height="60" rx="8" fill="#e8f2ff" stroke="#7aa7ff" />
  <text x="70" y="105" font-family="Arial" font-size="12">User Interface</text>

  <!-- ADK Workflow -->
  <rect x="220" y="50" width="240" height="120" rx="8" fill="#f0f7eb" stroke="#8ec27a" />
  <text x="255" y="75" font-family="Arial" font-size="12">ADK Workflow</text>
  <text x="245" y="95" font-family="Arial" font-size="11">security_checkpoint</text>
  <text x="245" y="110" font-family="Arial" font-size="11">financial_orchestrator</text>

  <!-- MCP Server -->
  <rect x="520" y="50" width="300" height="120" rx="8" fill="#fff6e6" stroke="#ffb86b" />
  <text x="560" y="75" font-family="Arial" font-size="12">MCP Server (Mock)</text>
  <text x="540" y="95" font-family="Arial" font-size="11">fetch_transaction_history</text>
  <text x="540" y="110" font-family="Arial" font-size="11">compute_flow_score</text>

  <!-- Arrows -->
  <line x1="180" y1="100" x2="220" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="460" y1="100" x2="520" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333" />
    </marker>
  </defs>

  <text x="30" y="360" font-family="Arial" font-size="10" fill="#666">Deterministic scoring, security checks, and MCP tools demonstrate the system components for the Kaggle capstone.</text>
</svg>